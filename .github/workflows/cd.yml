name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    # Specifies the environment for PyPI Trusted Publishing
    environment:
      name: pypi
      url: https://pypi.org/p/stock-fetcher

    # IMPORTANT: mandatory for PyPI trusted publishing via OIDC
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install build tools
      run: >-
        python -m pip install build --user

    - name: Build a binary wheel and a source tarball
      run: >-
        python -m build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
