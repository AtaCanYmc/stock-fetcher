name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the package with dev dependencies (Ruff, etc.) and all extras
        pip install ".[dev,all]"

    - name: Run Ruff (Linting)
      run: |
        ruff check .

    - name: Run Ruff (Formatting Check)
      run: |
        ruff format --check .

    - name: Build Package
      run: |
        pip install build
        python -m build
